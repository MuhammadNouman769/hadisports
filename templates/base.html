{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
       <title>{% block title %}Hadi Sports{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'logos/logo-.png' %}">
    <link rel="shortcut icon" href="{% static 'logos/logo-.png' %}">
    <link rel="apple-touch-icon" href="{% static 'logos/logo-.png' %}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css">

    <!-- Libraries -->
    <link rel="stylesheet"
          href="{% static 'lib/lightbox/css/lightbox.min.css' %}">
    <link rel="stylesheet"
          href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}">

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="{% static 'css/bootstrap.min.css' %}">

    <!-- Main CSS -->
    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">
</head>

<body>

    {% include 'includes/header.html' %}

    {% block content %}
    {% endblock %}

    {% include 'includes/footer.html' %}

    {% include 'includes/scripts.html' %}

</body>

</html>
